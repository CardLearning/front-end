name: Deploy Dev

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-dev
  cancel-in-progress: false

jobs:
  build:
    name: Build and publish artifact
    runs-on: ubuntu-latest
    environment: dev

    outputs:
      artifact-name: ${{ steps.meta.outputs.artifact_name }}
      blob-name: ${{ steps.meta.outputs.blob_name }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build static export
        run: npm run build:static

      - name: Package static artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p artifacts
          cd out
          zip -r ../artifacts/static-site.zip .

      - name: Set artifact metadata
        id: meta
        shell: bash
        run: |
          set -euo pipefail

          echo "artifact_name=static-site-${GITHUB_SHA}" >> "$GITHUB_OUTPUT"
          echo "blob_name=main/${GITHUB_SHA}/static-site.zip" >> "$GITHUB_OUTPUT"

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.artifact_name }}
          path: artifacts/static-site.zip
          if-no-files-found: error
          retention-days: 30

      - name: Validate Azure deployment configuration
        shell: bash
        run: |
          set -euo pipefail

          required_vars=(
            AZURE_CLIENT_ID
            AZURE_TENANT_ID
            AZURE_SUBSCRIPTION_ID
            AZURE_STORAGE_ACCOUNT
            AZURE_STORAGE_CONTAINER
            AZURE_STATIC_WEB_APPS_API_TOKEN
          )

          for name in "${required_vars[@]}"; do
            if [ -z "${!name:-}" ]; then
              echo "Missing required GitHub environment secret or variable: $name"
              exit 1
            fi
          done
        env:
          AZURE_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
          AZURE_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT || vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER || vars.AZURE_STORAGE_CONTAINER }}
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Upload artifact to Blob Storage
        shell: bash
        run: |
          set -euo pipefail

          az storage blob upload \
            --account-name "$AZURE_STORAGE_ACCOUNT" \
            --container-name "$AZURE_STORAGE_CONTAINER" \
            --name "${{ steps.meta.outputs.blob_name }}" \
            --file artifacts/static-site.zip \
            --overwrite true \
            --auth-mode login
        env:
          AZURE_STORAGE_ACCOUNT: ${{ secrets.AZURE_STORAGE_ACCOUNT || vars.AZURE_STORAGE_ACCOUNT }}
          AZURE_STORAGE_CONTAINER: ${{ secrets.AZURE_STORAGE_CONTAINER || vars.AZURE_STORAGE_CONTAINER }}

  deploy:
    name: Deploy static site
    runs-on: ubuntu-latest
    environment: dev
    needs: build

    steps:
      - name: Download workflow artifact
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.build.outputs.artifact-name }}
          path: artifacts

      - name: Extract static artifact
        shell: bash
        run: |
          set -euo pipefail

          mkdir -p out
          unzip -q artifacts/static-site.zip -d out

      - name: Validate deployment secret
        shell: bash
        run: |
          set -euo pipefail

          if [ -z "${AZURE_STATIC_WEB_APPS_API_TOKEN:-}" ]; then
            echo "Missing required GitHub environment secret: AZURE_STATIC_WEB_APPS_API_TOKEN"
            exit 1
          fi
        env:
          AZURE_STATIC_WEB_APPS_API_TOKEN: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          action: upload
          app_location: out
          output_location: ''
          skip_app_build: true
